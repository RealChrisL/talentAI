<main>
<!-- ===================== the shift ===================== -->

</section>

<!-- ===================== the system ===================== -->
<section id="system">
  <div class="wrap">

    <p class="sub reveal" data-i18n="security.framing"></p>
    <div class="sec-wrap glass glass-lum reveal">
      <svg class="sec-diagram" id="sec-diagram" viewBox="0 0 1000 320" role="img" aria-label="Security data flow">
        <path class="edge" id="sec-path" d="M90 80 H250 M340 80 H470 M560 80 H690 M780 80 V160 H560 M470 160 H300 V120" />
        <circle class="packet" id="sec-packet" r="5" cx="90" cy="80" />
        <g><rect class="node-box real" x="20" y="58" width="130" height="44" rx="4"/><text x="85" y="84" text-anchor="middle" data-i18n="sec.n.client.t"></text></g>
        <g><rect class="node-box real" x="250" y="58" width="130" height="44" rx="4"/><text x="315" y="84" text-anchor="middle" data-i18n="sec.n.line.t"></text></g>
        <g><rect class="node-box real" x="470" y="58" width="130" height="44" rx="4"/><text x="535" y="84" text-anchor="middle" data-i18n="sec.n.ngrok.t"></text></g>
        <g><rect class="node-box real" x="690" y="58" width="150" height="44" rx="4"/><text x="765" y="84" text-anchor="middle" data-i18n="sec.n.vm.t"></text></g>
        <g><rect class="node-box real" x="470" y="140" width="130" height="44" rx="4"/><text x="535" y="166" text-anchor="middle" data-i18n="sec.n.claude.t"></text></g>
        <g><rect class="node-box real" x="240" y="220" width="150" height="44" rx="4"/><text x="315" y="246" text-anchor="middle" data-i18n="sec.n.crm.t"></text></g>
        <g><rect class="node-box real" x="610" y="220" width="170" height="44" rx="4"/><text x="695" y="246" text-anchor="middle" data-i18n="sec.n.audit.t"></text></g>
        <path class="edge" d="M765 102 V242 H780 M695 242 H600 M315 102 V220" stroke-dasharray="4 4" opacity=".6"/>
      </svg>
      <div class="sec-residency"><span>◆</span><span data-i18n="security.residency"></span></div>
      <div class="badges" id="sec-badges"></div>
    </div>
  </div>
</section>
